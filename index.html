<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CozyCozy Studio | 코지코지스튜디오</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <style>
        /* 1. 커스텀 폰트 설정 (파일명 대소문자 주의!) */
        @font-face {
            font-family: 'A2Z-900';
            src: url('A2Z-900.otf') format('opentype');
            font-weight: 900;
            font-display: swap; /* 폰트 로드 전에도 글자가 보이게 설정 */
        }

        @font-face {
            font-family: 'A2Z-300';
            src: url('A2Z-300.otf') format('opentype');
            font-weight: 300;
            font-display: swap;
        }

        /* 2. 전체 스타일 (배경색: #F2F2F0 적용) */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow-x: hidden; 
            font-family: 'A2Z-300', sans-serif;
            background-color: #F2F2F0;
            color: #1a2a40; 
        }

        /* 대문 (Hero Section) */
        .hero { 
            width: 100vw; height: 100vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background-color: #1a2a40; 
            overflow: hidden; position: relative; 
        }

        .marquee-container { 
            width: 100%; overflow: hidden; position: relative; 
            display: flex; flex-direction: column; 
            transform: rotate(-5deg) scale(1.1); 
            gap: 0; 
        }

        .marquee-row { 
            display: flex; width: 100%; white-space: nowrap; overflow: hidden; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }

        .marquee-content { display: flex; white-space: nowrap; }
        .marquee-row:hover .marquee-content { animation-play-state: paused; cursor: pointer; }

        .logo-text { 
            font-family: 'A2Z-900', sans-serif;
            font-size: 12vw; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: -0.02em; 
            padding: 0 1.5vw; 
        }

        .orange-text { color: #ff6b35; }
        .white-text { color: #fdfaf5; }

        .speed-1 .marquee-content { animation: marquee 25s linear infinite; }
        .speed-2 .marquee-content { animation: marquee-reverse 30s linear infinite; }

        /* 대문 텍스트 및 버튼 */
        .hero-text-content { 
            position: absolute; bottom: 8%; text-align: center; color: #fdfaf5; z-index: 10; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.5s ease;
        }
        
        .hero h1 { 
            font-family: 'A2Z-900', sans-serif;
            font-size: 2.5rem; 
            font-weight: 900;
            margin-bottom: 0.5rem; 
        }
        
        .hero p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 1.5rem; }
        
        /* 버튼 스타일 (카톡 링크로 연결) */
        .cta-btn { 
            display: inline-block; padding: 14px 28px; 
            background: #ff6b35; color: #fdfaf5; 
            text-decoration: none; border-radius: 50px; 
            font-weight: bold; transition: 0.3s; 
            font-family: 'A2Z-900', sans-serif;
        }
        .cta-btn:hover { background: #fdfaf5; color: #1a2a40; transform: translateY(-3px); }

        /* 포트폴리오 섹션 */
        .portfolio { padding: 100px 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; }
        .video-card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); transition: 0.3s; }
        .video-card:hover { transform: translateY(-10px); }
        iframe { width: 100%; border-radius: 15px; aspect-ratio: 16/9; border: none; }
        .video-card h3 { font-family: 'A2Z-900', sans-serif; margin-top: 15px; font-size: 1.2rem; font-weight: 900; }

        /* 애니메이션 */
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        @keyframes marquee-reverse { 0% { transform: translateX(-100%); } 100% { transform: translateX(0); } }

        .fade-out { opacity: 0; filter: blur(20px); transform: scale(1.8) rotate(-10deg); pointer-events: none; }
    </style>
</head>
<body>

    <section class="hero" id="hero">
        <div class="marquee-container" id="marquee-container">
            <div class="marquee-row speed-1">
                <div class="marquee-content">
                    <span class="logo-text orange-text">COZYCOZYSTUDIO</span>
                    <span class="logo-text white-text">COZYCOZYSTUDIO</span>
                </div>
                <div class="marquee-content" aria-hidden="true">
                    <span class="logo-text orange-text">COZYCOZYSTUDIO</span>
                    <span class="logo-text white-text">COZYCOZYSTUDIO</span>
                </div>
            </div>
            <div class="marquee-row speed-2">
                <div class="marquee-content">
                    <span class="logo-text white-text">COZYCOZYSTUDIO</span>
                    <span class="logo-text orange-text">COZYCOZYSTUDIO</span>
                </div>
                <div class="marquee-content" aria-hidden="true">
                    <span class="logo-text white-text">COZYCOZYSTUDIO</span>
                    <span class="logo-text orange-text">COZYCOZYSTUDIO</span>
                </div>
            </div>
            <div class="marquee-row speed-1">
                <div class="marquee-content">
                    <span class="logo-text orange-text">COZYCOZYSTUDIO</span>
                    <span class="logo-text white-text">COZYCOZYSTUDIO</span>
                </div>
                <div class="marquee-content" aria-hidden="true">
                    <span class="logo-text orange-text">COZYCOZYSTUDIO</span>
                    <span class="logo-text white-text">COZYCOZYSTUDIO</span>
                </div>
            </div>
        </div>

        <div class="hero-text-content" id="hero-text-content">
            <h1>COZYCOZY STUDIO</h1>
            <p>당신의 상상을 현실로, 딸깍 하나로 완성하는 영상 스튜디오</p>
            <a href="https://open.kakao.com/o/sdvyJqni" target="_blank" class="cta-btn">INQUIRY NOW</a>
        </div>
    </section>

    <section class="portfolio">
        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/알파벳숫자" allowfullscreen></iframe>
            <h3>BRAND FILM 01</h3>
        </div>
        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/알파벳숫자" allowfullscreen></iframe>
            <h3>MUSIC VIDEO 01</h3>
        </div>
    </section>

    <script>
        const hero = document.getElementById('hero');
        const marqueeContainer = document.getElementById('marquee-container');
        const heroTextContent = document.getElementById('hero-text-content');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const heroHeight = hero.offsetHeight;

            if (scrollY > heroHeight * 0.2) { 
                marqueeContainer.classList.add('fade-out');
                heroTextContent.classList.add('fade-out');
            } else {
                marqueeContainer.classList.remove('fade-out');
                heroTextContent.classList.remove('fade-out');
            }
        });
    </script>

</body>
</html>
