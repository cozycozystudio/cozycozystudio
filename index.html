<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: #fdfaf5; color: #1a2a40; text-align: center; }

        h1 { font-size: 3rem; margin-bottom: 10px; }

        .portfolio { padding: 50px 20px; max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .video-card { background: white; padding: 10px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        iframe { width: 100%; border-radius: 10px; aspect-ratio: 16/9; border: none; }
