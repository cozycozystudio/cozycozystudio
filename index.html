        /* 1. 두 가지 커스텀 폰트(@font-face) 설정 */
        
        /* 대문 로고용 (900 - 아주 두꺼움) */
        @font-face {
            font-family: 'A2Z-900';
            src: url('A2Z-900.otf') format('opentype');
            font-weight: 900;
            font-style: normal;
        }

        /* 나머지 웹사이트용 (300 - 얇음) */
        @font-face {
            font-family: 'A2Z-300';
            src: url('A2Z-300.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
        }

        /* 2. 기본 스타일 설정 (나머지 웹사이트용 폰트 적용) */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow-x: hidden; 
            font-family: 'A2Z-300', sans-serif; /* 기본 폰트 설정 */
            background-color: #fdfaf5; 
            color: #1a2a40; 
        }

        /* 대문 (Hero Section) 스타일 */
        .hero { 
            width: 100vw; height: 100vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background-color: #1a2a40; 
            overflow: hidden; position: relative;
